version: 2.1

jobs:
  build:
    machine:
      image: ubuntu-2404:current

    steps:
      - checkout

      - run:
          name: Run shellcheck
          command: make shellcheck

      - run:
          name: Insert version
          command: |
            if [ -n "$CIRCLE_TAG" ]; then
              sed -i "s/dirty/$CIRCLE_TAG/g" flash
            fi

      - run:
          name: Show version
          command: ./flash --version

      - run:
          name: Run BATS tests
          command: make test

  deploy:
    machine:
      image: ubuntu-2404:current

    steps:
      - checkout

      - run:
          name: Insert version
          command: sed -i "s/dirty/$CIRCLE_TAG/g" flash

      - run:
          name: Show version
          command: ./flash --version

      - run:
          name: Run BATS tests with version
          command: make test

      - run:
          name: Deploy
          command: |
            curl -sSL https://github.com/tcnksm/ghr/releases/download/v0.16.2/ghr_v0.16.2_linux_amd64.tar.gz | tar xz --strip-components=1
            mkdir output
            sha256sum flash > flash.sha256
            cp flash* output
            ./ghr -u barthel $CIRCLE_TAG output/

workflows:
  version: 2
  build-n-deploy:
    jobs:
      - build:
          filters:
            tags:
              only: /.*/
      - deploy:
          requires:
            - build
          filters:
            tags:
              only: /^.*/
            branches:
              ignore: /.*/
