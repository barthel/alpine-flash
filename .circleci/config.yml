version: 2.1

workflows:
  version: 2.1
  build_and_deploy:
    jobs:
      - build:
          filters:
            tags:
              only: /.*/
          context:
            - "github"

jobs:
  build:
    machine:
      image: ubuntu-2404:current
    steps:
      - checkout

      - run:
          name: Build and test
          command: |
            VERSION="${CIRCLE_TAG}" ./build.sh

      - run:
          name: Collect artifacts
          command: |
            mkdir -p output
            cp flash output/
            sha256sum flash > output/flash.sha256

      - run:
          name: Deploy GitHub Release
          command: |
            if [ -n "${CIRCLE_TAG}" ]; then
              PRE=false
              [[ ${CIRCLE_TAG} = *"rc"* ]] && PRE=true
              API="https://api.github.com/repos/${GITHUB_USER}/alpine-flash"
              AUTH="-H \"Authorization: token ${GITHUB_TOKEN}\""
              # Delete existing release if present
              RELEASE_ID=$(curl -sf -H "Authorization: token ${GITHUB_TOKEN}" \
                "${API}/releases/tags/${CIRCLE_TAG}" \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || true)
              if [ -n "${RELEASE_ID}" ]; then
                curl -sf -X DELETE -H "Authorization: token ${GITHUB_TOKEN}" \
                  "${API}/releases/${RELEASE_ID}" || true
              fi
              # Create release
              RESPONSE=$(curl -sf -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"tag_name\":\"${CIRCLE_TAG}\",\"name\":\"${CIRCLE_TAG}\",\"prerelease\":${PRE}}" \
                "${API}/releases")
              UPLOAD_URL=$(echo "${RESPONSE}" \
                | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'])" \
                | sed 's/{?name,label}//')
              # Upload assets
              curl -sf -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Content-Type: application/octet-stream" \
                --data-binary @output/flash \
                "${UPLOAD_URL}?name=flash"
              curl -sf -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Content-Type: text/plain" \
                --data-binary @output/flash.sha256 \
                "${UPLOAD_URL}?name=flash.sha256"
            fi

      - store_artifacts:
          path: /home/circleci/project/output
