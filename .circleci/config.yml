version: 2.1

workflows:
  version: 2.1
  build_and_deploy:
    jobs:
      - build:
          filters:
            tags:
              only: /.*/
          context:
            - "github"

jobs:
  build:
    machine:
      image: ubuntu-2404:current
    steps:
      - checkout

      - run:
          name: Build and test
          command: |
            VERSION="${CIRCLE_TAG}" ./build.sh

      - run:
          name: Collect artifacts
          command: |
            mkdir -p output
            cp flash output/
            sha256sum flash > output/flash.sha256

      - run:
          name: Deploy GitHub Release
          command: |
            if [ -n "${CIRCLE_TAG}" ]; then
              # Install gh CLI
              curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
                | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
                | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
              sudo apt-get update && sudo apt-get install -y gh
              export GH_TOKEN="${GITHUB_TOKEN}"
              PRE_FLAG=""
              if [[ ${CIRCLE_TAG} = *"rc"* ]]; then
                PRE_FLAG="--prerelease"
              fi
              gh release delete "${CIRCLE_TAG}" --yes --cleanup-tag 2>/dev/null || true
              gh release create "${CIRCLE_TAG}" output/flash output/flash.sha256 \
                --title "${CIRCLE_TAG}" ${PRE_FLAG}
            fi

      - store_artifacts:
          path: /home/circleci/project/output
